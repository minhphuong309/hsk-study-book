<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK Study Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="#overview" class="brand">HSK Study Book</a>
      <nav class="main-nav">
        <a href="#overview">Tổng quan</a>
        <a href="#lessons">Các bài học</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="overview" class="hero section">
      <div class="container hero-card">
        <div class="hero-copy">
          <p class="eyebrow">HSK 1-6</p>
          <h1>Chăm chỉ chăm chỉ chăm chỉ</h1>
        </div>
      </div>
    </section>

    <section id="lessons" class="section">
      <div class="container lesson-page">
          <div id="levelTabs" class="level-tabs"></div>
          <div id="lessonTabs" class="lesson-tabs"></div>
          <div class="lesson-layout">
            <nav id="sectionNav" class="section-nav" aria-label="Lesson sections"></nav>
            <div class="lesson-shell">
              <header class="lesson-head" id="lessonHead"></header>
              <div class="lesson-sections" id="lessonSections"></div>
            </div>
          </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
